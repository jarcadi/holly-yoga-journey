<script>
    // Existing script from script.js (if any) plus schedule toggle functionality
    function toggleDescription(id) {
        var desc = document.getElementById(id);
        if (desc.classList.contains('hidden')) {
            desc.classList.remove('hidden');
        } else {
            desc.classList.add('hidden');
        }
    }

    // Lightbox functionality
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');
    var closeLightbox = document.getElementById('close-lightbox');

    function openLightbox(src, alt) {
        lightbox.style.display = 'flex';
        lightboxImg.src = src;
        lightboxImg.alt = alt;
    }

    closeLightbox.onclick = function() {
        lightbox.style.display = 'none';
    };

    lightbox.onclick = function(event) {
        if (event.target === lightbox) {
            lightbox.style.display = 'none';
        }
    };

    // Mobile menu functionality
    document.addEventListener('DOMContentLoaded', function() {
        var menuButton = document.getElementById('mobile-menu-btn');
        var mobileMenu = document.getElementById('mobile-menu');
        if (menuButton && mobileMenu) {
            menuButton.addEventListener('click', function() {
                if (mobileMenu.classList.contains('hidden')) {
                    mobileMenu.classList.remove('hidden');
                } else {
                    mobileMenu.classList.add('hidden');
                }
            });
        }

        // Log to console if page load is stuck (for debugging)
        setTimeout(function() {
            if (document.readyState !== 'complete') {
                console.log('Page load seems stuck. Check for slow resources or JS errors.');
            }
        }, 10000); // Check after 10 seconds
    });
</script>
