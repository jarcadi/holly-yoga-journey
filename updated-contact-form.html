<section id="contact" class="bg-gray-100 py-16 opacity-0 translate-y-10" data-animate>
    <div class="container mx-auto px-4 md:px-6">
        <h2 class="text-3xl font-['Playfair_Display'] font-bold text-green-800 mb-8 text-center">Contact Holly</h2>
        <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
            <form action="https://formspree.io/f/myourformid" method="POST" class="space-y-5">
                <div>
                    <label for="name" class="block text-gray-700 font-medium mb-1">Name</label>
                    <input type="text" id="name" name="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent" required aria-required="true">
                </div>
                <div>
                    <label for="email" class="block text-gray-700 font-medium mb-1">Email</label>
                    <input type="email" id="email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent" required aria-required="true">
                </div>
                <div>
                    <label for="message" class="block text-gray-700 font-medium mb-1">Message</label>
                    <textarea id="message" name="message" rows="5" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent" required aria-required="true"></textarea>
                </div>
                <div class="text-center">
                    <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors duration-300">Send Message</button>
                </div>
                <input type="hidden" name="_subject" value="New Contact Form Submission from Holly's Yoga Journey">
                <input type="hidden" name="_next" value="thank-you.html">
            </form>
            <p class="text-center text-gray-500 mt-4">(Messages will be sent to Holly's team. We'll respond soon!)</p>
        </div>
        <div class="text-center mt-8">
            <p class="mt-2">Contact: holly@yogajourney.com | (555) 123-4567</p>
        </div>
    </div>
</section>
