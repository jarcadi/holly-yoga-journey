<script>
    // Existing script from script.js (if any) plus schedule toggle functionality
    function toggleDescription(id) {
        var desc = document.getElementById(id);
        if (desc.classList.contains('hidden')) {
            desc.classList.remove('hidden');
        } else {
            desc.classList.add('hidden');
        }
    }

    // Lightbox functionality
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');
    var closeLightbox = document.getElementById('close-lightbox');

    function openLightbox(src, alt) {
        lightbox.style.display = 'flex';
        lightboxImg.src = src;
        lightboxImg.alt = alt;
    }

    closeLightbox.onclick = function() {
        lightbox.style.display = 'none';
    };

    lightbox.onclick = function(event) {
        if (event.target === lightbox) {
            lightbox.style.display = 'none';
        }
    };

    // Mobile menu functionality
    document.addEventListener('DOMContentLoaded', function() {
        var menuButton = document.getElementById('mobile-menu-btn');
        var mobileMenu = document.getElementById('mobile-menu');
        if (menuButton && mobileMenu) {
            menuButton.addEventListener('click', function() {
                if (mobileMenu.classList.contains('hidden')) {
                    mobileMenu.classList.remove('hidden');
                } else {
                    mobileMenu.classList.add('hidden');
                }
            });
        }

        // Force page load to complete even if resources are stuck
        setTimeout(function() {
            if (document.readyState !== 'complete') {
                console.log('Page load forced to complete after timeout. Check for slow resources or JS errors.');
                window.dispatchEvent(new Event('load'));
            } else {
                console.log('Page load completed naturally.');
            }
        }, 8000); // Force load event after 8 seconds

        // Limit image onerror retries to prevent endless loading
        var images = document.getElementsByTagName('img');
        for (var i = 0; i < images.length; i++) {
            images[i].setAttribute('data-retry-count', '0');
            var originalOnError = images[i].getAttribute('onerror');
            if (originalOnError) {
                images[i].setAttribute('onerror', 'if (parseInt(this.getAttribute("data-retry-count")) < 1) { this.setAttribute("data-retry-count", parseInt(this.getAttribute("data-retry-count")) + 1); ' + originalOnError + ' } else { console.log("Image load failed after retry: " + this.src); }');
            }
        }
    });
</script>
